version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=${RDS_DATABASE_URL}
      - PORT=5000
    networks:
      - amiibo-network
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
      - REACT_APP_API_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - amiibo-network
    restart: always

networks:
  amiibo-network:
    driver: bridge